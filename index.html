<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/phoenix-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Phoenix Backtester</title>
    <!-- TradingView Charting Library Widget (Lightweight version for embedding) -->
    <!-- Using TradingView's official widget for real-time charting -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Make TradingView available globally for React components
        window.TradingView = {
            widget: function(options) {
                // This will be initialized when TradingView loads
                if (typeof TradingView !== 'undefined') {
                    return new window.TradingView.widget(options);
                }
                return null;
            }
        };
    </script>
    <!-- Font Awesome Icons (for minor UI accents) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
